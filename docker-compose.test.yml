# Local Postgres + Neon HTTP proxy so the @neondatabase/serverless (neon-http)
# driver works against a real DB for the e2e tests — mirrors the CI services.
# Bring up:  docker compose -f docker-compose.test.yml up -d --wait
# Then use:  DATABASE_URL=postgres://postgres:postgres@db.localtest.me:5432/main
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
    ports:
      - '4444:4444'
    depends_on:
      postgres:
        condition: service_healthy
